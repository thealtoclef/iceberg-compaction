# Example: Run iceberg-compaction with MinIO and Iceberg REST Catalog
#
# This docker-compose setup demonstrates how to run iceberg-compaction
# in a containerized environment with:
# - MinIO (S3-compatible storage)
# - Iceberg REST Catalog
# - iceberg-compaction CLI
#
# Usage:
#   # Start infrastructure (MinIO + REST Catalog)
#   docker-compose -f docker-compose.example.yml up -d minio rest-catalog
#
#   # Run compaction (one-off container)
#   docker-compose -f docker-compose.example.yml run --rm compaction \
#     --config /config/config.yaml compact --namespace prod --table events
#
#   # Run cleanup
#   docker-compose -f docker-compose.example.yml run --rm compaction \
#     --config /config/config.yaml cleanup --namespace prod --table events
#
#   # Stop infrastructure
#   docker-compose -f docker-compose.example.yml down

services:
  # MinIO - S3-compatible object storage
  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Create MinIO bucket on startup
  create-bucket:
    image: minio/mc:RELEASE.2025-01-20T14-49-07Z
    container_name: create-bucket
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing myminio/iceberg-warehouse;
      exit 0;
      "

  # Iceberg REST Catalog
  rest-catalog:
    image: tabulario/iceberg-rest:1.6.1
    container_name: rest-catalog
    ports:
      - "8181:8181"
    environment:
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - CATALOG_REST__S3_ENDPOINT=http://minio:9000
      - CATALOG_REST__S3_PATH_STYLE_ACCESS=true
      - CATALOG_REST__WAREHOUSE=s3://iceberg-warehouse
      - CATALOG_REST__IO_IMPL=org.apache.iceberg.io.ResolvingFileIO
    depends_on:
      create-bucket:
        condition: service_completed_successfully

  # iceberg-compaction CLI
  # Note: This is a distroless image - run commands directly with 'run --rm'
  # Distroless images don't have shells, so 'exec' won't work
  compaction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iceberg-compaction
    environment:
      # Inherit from environment or use config file
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
    volumes:
      # Mount config directory
      - ./examples/docker-config:/config:ro
    depends_on:
      - rest-catalog
      - minio
    # No entrypoint override - runs the binary directly
    # Use 'docker-compose run --rm compaction <args>' to execute commands

volumes:
  minio_data:
    driver: local

networks:
  default:
    name: iceberg-network
